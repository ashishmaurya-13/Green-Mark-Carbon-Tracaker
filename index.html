<!DOCTYPE html>
<html lang="en">
<head>

</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="logo">🌿 GreenMark</div>
    <button class="btn-primary" 
            onclick="window.location.href='input.html'">
      Try Demo
    </button>

  <!-- HERO SECTION -->

    <div class="stat-card">

    <div class="stat-card">

     <div class="stat-card">
